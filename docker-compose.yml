version: '3.8'

services:
  staybot-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staybot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    # Uncomment the volumes block below if you want to mount the data directories 
    # instead of baking them into the container image. This is useful if you plan
    # to update the SQLite/ChromaDB data frequently without rebuilding the image.
    # volumes:
    #   - ./data:/app/data
    #   - ./embeddings:/app/embeddings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
